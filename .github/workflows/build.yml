name: build
on: [pull_request, push, workflow_dispatch]
env:
  DOCKER_CACHE_REPOSITORY: ghcr.io/ksmanis/gentoo-distcc-cache
  DOCKERHUB_REPOSITORY: ksmanis/gentoo-distcc
  DOCKERHUB_USERNAME: ksmanis
jobs:
  images:
    continue-on-error: true
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - id: "386"
            crossdev_targets: []
          - id: "amd64"
            crossdev_targets: ["aarch64-unknown-linux-gnu"]
          - id: "arm/v6"
            crossdev_targets: []
          - id: "arm/v7"
            crossdev_targets: []
          - id: "arm64"
            crossdev_targets: ["x86_64-pc-linux-gnu"]
          - id: "ppc64le"
            crossdev_targets: []
        manifest:
          - base: build-base
            clang: ""
            id: latest
            test_target: distcc
          - base: build-ccache
            clang: ""
            id: ccache
            test_target: distcc-ccache
          - base: build-ccache
            clang: "1"
            id: ccache_clang
            test_target: distcc-ccache-clang
          - base: build-base
            clang: "1"
            id: clang
            test_target: distcc-clang
        exclude:
          # CI times out due to QEMU emulation on these architectures
          - arch:
              id: "386"
            manifest:
              clang: "1"
          - arch:
              id: "ppc64le"
            manifest:
              clang: "1"
    env:
      CROSSDEV_TARGETS: ${{ join(matrix.arch.crossdev_targets, ' ') }}
    name: ${{ matrix.arch.id }}:${{ matrix.manifest.id }} image
    runs-on: ${{ startsWith(matrix.arch.id, 'arm') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    outputs:
      manifests: ${{ steps.output.outputs.manifests }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Prepare build variables
        id: prep
        run: |
          {
            echo "stage3_version=$(sed -n 's#^FROM ghcr.io/ksmanis/stage3:\([^[:space:]@]\+\).*#\1#p' Dockerfile)"
            echo "tag_arch=$(echo "${{ matrix.arch.id }}" | tr -d '/')"
          } >> "$GITHUB_OUTPUT"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        if: matrix.arch.id == '386' || matrix.arch.id == 'ppc64le'
        with:
          platforms: ${{ matrix.arch.id }}
      - name: Set up buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Define Docker metadata
        id: docker-metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: |
            docker.io/${{ env.DOCKERHUB_REPOSITORY }},enable=${{ github.ref_name == github.event.repository.default_branch }}
            ghcr.io/${{ env.DOCKERHUB_REPOSITORY }}
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.title=gentoo-distcc
            org.opencontainers.image.authors=Konstantinos Smanis <konstantinos.smanis@gmail.com>
          tags: |
            type=ref,event=branch,prefix=${{ steps.prep.outputs.tag_arch }}-branch-,suffix=-${{ matrix.manifest.id }}
            type=ref,event=pr,prefix=${{ steps.prep.outputs.tag_arch }}-pr-,suffix=-${{ matrix.manifest.id }}
            type=raw,value=${{ steps.prep.outputs.tag_arch }}-${{ steps.prep.outputs.stage3_version }}-${{ matrix.manifest.id }},enable={{is_default_branch}}
            type=raw,value=${{ steps.prep.outputs.tag_arch }}-${{ matrix.manifest.id }},enable={{is_default_branch}}
      - name: Set up buildkit-cache-dance
        env:
          # renovate: datasource=github-releases depName=reproducible-containers/buildkit-cache-dance
          BUILDKIT_CACHE_DANCE_VERSION: v3.3.2
        run: |
          mkdir -p buildkit-cache-dance
          curl -fsSL "https://github.com/reproducible-containers/buildkit-cache-dance/archive/refs/tags/${BUILDKIT_CACHE_DANCE_VERSION}.tar.gz" | tar --strip-components=1 -C buildkit-cache-dance -xz
      - name: Restore Docker mounts cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        id: cache-restore
        with:
          path: cache-mount
          key: cache-mount-${{ matrix.arch.id }}-${{ matrix.manifest.id }}-${{ hashFiles('Dockerfile') }}-${{ github.sha }}
          restore-keys: |
            cache-mount-${{ matrix.arch.id }}-${{ matrix.manifest.id }}-${{ hashFiles('Dockerfile') }}-
            cache-mount-${{ matrix.arch.id }}-${{ matrix.manifest.id }}-
            cache-mount-${{ matrix.arch.id }}-
      - name: Inject Docker mounts cache
        run: |
          node buildkit-cache-dance/dist/index.js \
            --builder "${{ steps.setup-buildx.outputs.name }}" \
            --cache-dir cache-mount \
            --cache-map '{"cache-mount/base":{"id":"base","target":"/var/cache/binpkgs"},"cache-mount/ccache":{"id":"ccache","target":"/var/cache/binpkgs"}}'
      - name: Log in to Docker Hub
        if: github.ref_name == github.event.repository.default_branch
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log in to GitHub Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          build-args: |
            BASE=${{ matrix.manifest.base }}
            CLANG=${{ matrix.manifest.clang }}
            CROSSDEV_TARGETS=${{ env.CROSSDEV_TARGETS }}
          cache-from: |
            type=registry,ref=${{ env.DOCKER_CACHE_REPOSITORY }}:${{ steps.docker-metadata.outputs.version }}
            type=registry,ref=${{ env.DOCKER_CACHE_REPOSITORY }}:${{ steps.prep.outputs.tag_arch }}-branch-${{ github.event.repository.default_branch }}-${{ matrix.manifest.id }}
          cache-to: type=registry,ref=${{ env.DOCKER_CACHE_REPOSITORY }}:${{ steps.docker-metadata.outputs.version }},ignore-error=true,mode=max
          context: .
          labels: ${{ steps.docker-metadata.outputs.labels }}
          load: true
          platforms: linux/${{ matrix.arch.id }}
          tags: ${{ steps.docker-metadata.outputs.tags }}
          target: distcc
      - name: Inspect image
        run: |
          docker image inspect ${{ steps.build.outputs.imageid }}
      - name: Test distcc
        env:
          DOCKER_DEFAULT_PLATFORM: linux/${{ matrix.arch.id }}
        run: |
          docker compose -f docker-compose.test.yml -p test up \
            --exit-code-from ${{ matrix.manifest.test_target }}-client \
            ${{ matrix.manifest.test_target }}-client ${{ matrix.manifest.test_target }}-server
      - name: Push image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          build-args: |
            BASE=${{ matrix.manifest.base }}
            CLANG=${{ matrix.manifest.clang }}
            CROSSDEV_TARGETS=${{ env.CROSSDEV_TARGETS }}
          cache-from: |
            type=registry,ref=${{ env.DOCKER_CACHE_REPOSITORY }}:${{ steps.docker-metadata.outputs.version }}
            type=registry,ref=${{ env.DOCKER_CACHE_REPOSITORY }}:${{ steps.prep.outputs.tag_arch }}-branch-${{ github.event.repository.default_branch }}-${{ matrix.manifest.id }}
          cache-to: type=registry,ref=${{ env.DOCKER_CACHE_REPOSITORY }}:${{ steps.docker-metadata.outputs.version }},ignore-error=true,mode=max
          context: .
          labels: ${{ steps.docker-metadata.outputs.labels }}
          platforms: linux/${{ matrix.arch.id }}
          provenance: mode=max
          push: true
          sbom: true
          tags: ${{ steps.docker-metadata.outputs.tags }}
          target: distcc
      - name: Extract Docker mounts cache
        if: github.ref_name == github.event.repository.default_branch
        run: |
          node buildkit-cache-dance/dist/index.js \
            --extract \
            --builder "${{ steps.setup-buildx.outputs.name }}" \
            --cache-dir cache-mount \
            --cache-map '{"cache-mount/base":{"id":"base","target":"/var/cache/binpkgs"},"cache-mount/ccache":{"id":"ccache","target":"/var/cache/binpkgs"}}'
      - name: Save Docker mounts cache
        if: github.ref_name == github.event.repository.default_branch
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: cache-mount
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}
      - name: Attest Docker Hub image
        if: github.ref_name == github.event.repository.default_branch
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          push-to-registry: true
          subject-digest: ${{ steps.push.outputs.digest }}
          subject-name: docker.io/${{ env.DOCKERHUB_REPOSITORY }}
      - name: Attest GitHub Container registry image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          push-to-registry: true
          subject-digest: ${{ steps.push.outputs.digest }}
          subject-name: ghcr.io/${{ env.DOCKERHUB_REPOSITORY }}
      - name: Prepare image results
        run: |
          echo "${DOCKER_METADATA_OUTPUT_JSON}" | jq -c .tags > images.json
      - name: Upload image results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: images-${{ strategy.job-index }}
          path: images.json
      - name: Prepare outputs
        id: output
        run: |
          echo "manifests=$(./transform.py manifests)" >> "$GITHUB_OUTPUT"
  manifests:
    needs: images
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        manifest: ${{ fromJson(needs.images.outputs.manifests) }}
    env:
      MANIFEST: ${{ matrix.manifest.repo }}:${{ matrix.manifest.manifest_tag }}
    name: ${{ matrix.manifest.registry }}:${{ matrix.manifest.manifest_tag }} manifest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Download image results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          path: images
          pattern: images-*
      - name: Log in to GitHub Container registry
        if: matrix.manifest.registry == 'ghcr.io'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Fetch descriptors
        run: |
          readarray -t images < <(./transform.py images '${{ matrix.manifest.repo }}' '${{ matrix.manifest.image_tag }}' images/*/images.json)
          if [ "${#images[@]}" -eq 0 ]; then
            echo "No images found for manifest ${MANIFEST}, aborting..."
            exit 1
          fi

          i=0
          for image in "${images[@]}"; do
            docker buildx imagetools inspect --raw "${image}" | jq -c '.manifests[] | select(.platform.architecture != "unknown")' > "descriptor-${i}.json"
            i=$((i + 1))
          done
      - name: Log in to Docker Hub
        if: matrix.manifest.registry == 'docker.io'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create and push manifest
        run: |
          descriptors=(descriptor-*.json)
          docker buildx imagetools create "${descriptors[@]/#/--file=}" --tag="${MANIFEST}"
      - name: Resolve manifest digest
        id: manifest-digest
        run: |
          echo "digest=$(docker buildx imagetools inspect --format '{{json .Manifest.Digest}}' "${MANIFEST}" | jq -r)" >> "$GITHUB_OUTPUT"
      - name: Attest manifest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          push-to-registry: true
          subject-digest: ${{ steps.manifest-digest.outputs.digest }}
          subject-name: ${{ matrix.manifest.repo }}
